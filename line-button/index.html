<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Line Button</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Line Button</h1>
        <p class="hint">悬停查看线条动画+背景旋转效果</p>
        
        <div class="button">
            <div class="bg"></div>
            <div class="border"></div>
            <div class="content">
                <div class="svgBox">
                    <svg xmlns="https://www.w3.org/2000/svg" version="1.1" width="100" height="4" class="svgLine">
                        <line class="line" x1="0" y1="2" x2="100" y2="2" fill="none" stroke-linecap="round" stroke-width="2" stroke-dasharray="60"></line>
                    </svg>
                    <svg xmlns="https://www.w3.org/2000/svg" version="1.1" width="100" height="4" class="svgLine">
                        <line class="line" x1="0" y1="2" x2="100" y2="2" fill="none" stroke-linecap="round" stroke-width="2" stroke-dasharray="60"></line>
                    </svg>
                    <svg xmlns="https://www.w3.org/2000/svg" version="1.1" width="100" height="4" class="svgLine">
                        <line class="line" x1="0" y1="2" x2="100" y2="2" fill="none" stroke-linecap="round" stroke-width="2" stroke-dasharray="60"></line>
                    </svg>
                </div>
                <span class="text" data-text="GO">GO</span>
            </div>
        </div>
    </div>
</body>
</html>
