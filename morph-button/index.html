<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morph Button</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Morph Button</h1>
        <p class="hint">悬停查看果冻变形+轨道小球+文字弹跳效果</p>
        
        <button class="morph-btn">
            <span class="btn-fill"></span>
            <span class="shadow"></span>
            <span class="btn-text">
                <span style="--i:0">L</span><span style="--i:1">a</span><span style="--i:2">u</span><span style="--i:3">n</span><span style="--i:4">c</span><span style="--i:5">h</span>
            </span>
            <span class="orbit-dots">
                <span></span>
                <span></span>
                <span></span>
                <span></span>
            </span>
            <span class="corners">
                <span></span>
                <span></span>
                <span></span>
                <span></span>
            </span>
        </button>
    </div>
</body>
</html>
