<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charge Button</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Charge Button</h1>
        <p class="hint">Gradient circles fill animation</p>

        <!-- From Uiverse.io by TemRevil -->
        <button class="button">
            <div class="b-hover">
                <div class="cir-1 filter"></div>
                <div class="cir-2 filter"></div>
                <div class="cir-3 filter"></div>
                <div class="cir-4 filter"></div>
                <div class="cir-5 filter"></div>
                <div class="cir-6 filter"></div>
            </div>
            Charge &amp; Go
        </button>
    </div>
</body>
</html>
