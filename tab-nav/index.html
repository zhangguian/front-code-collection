<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tab Nav</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Tab Nav</h1>
        <p class="hint">Radio button tab navigation</p>

        <!-- From Uiverse.io by gharsh11032000 -->
        <div class="tabs">
            <div class="tab-group">
                <input checked="" id="tab1" name="tab" value="1" type="radio" />
                <label for="tab1">
                    <span>1</span>
                </label>
            </div>
            <div class="tab-group">
                <input id="tab2" name="tab" value="2" type="radio" />
                <label for="tab2">
                    <span>2</span>
                </label>
            </div>
            <div class="tab-group">
                <input id="tab3" name="tab" value="3" type="radio" />
                <label for="tab3">
                    <span>3</span>
                </label>
            </div>
        </div>
    </div>
</body>
</html>
