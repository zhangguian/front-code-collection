<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Power Switch</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Power Switch</h1>
        <p class="hint">Neon LED power toggle</p>

        <!-- From Uiverse.io by preet_7613 -->
        <label class="switch">
            <input class="switch__input" type="checkbox" role="switch" />
            <span class="switch__base-outer"></span>
            <span class="switch__base-inner"></span>
            <svg
                class="switch__base-neon"
                viewBox="0 0 40 24"
                width="60"
                height="36"
                xmlns="http://www.w3.org/2000/svg"
            >
                <defs>
                    <filter id="glow">
                        <feGaussianBlur result="coloredBlur" stdDeviation="1"></feGaussianBlur>
                        <feMerge>
                            <feMergeNode in="coloredBlur"></feMergeNode>
                            <feMergeNode in="SourceGraphic"></feMergeNode>
                        </feMerge>
                    </filter>
                    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="0">
                        <stop offset="0%" stop-color="hsl(123,90%,70%)"></stop>
                        <stop offset="100%" stop-color="hsl(168,90%,70%)"></stop>
                    </linearGradient>
                    <linearGradient id="g2" x1="0.7" y1="0" x2="0.3" y2="1">
                        <stop offset="25%" stop-color="hsla(123,90%,70%,0)"></stop>
                        <stop offset="50%" stop-color="hsla(123,90%,70%,0.3)"></stop>
                        <stop offset="100%" stop-color="hsla(168,90%,70%,0.3)"></stop>
                    </linearGradient>
                </defs>
                <path
                    fill="none"
                    filter="url(#glow)"
                    stroke="url(#g1)"
                    stroke-width="1"
                    stroke-dasharray="0 104.26 0"
                    stroke-dashoffset="0.01"
                    stroke-linecap="round"
                    d="m.5,12C.5,5.649,5.649.5,12,.5h16c6.351,0,11.5,5.149,11.5,11.5s-5.149,11.5-11.5,11.5H12C5.649,23.5.5,18.351.5,12Z"
                ></path>
            </svg>
            <span class="switch__knob-shadow"></span>
            <span class="switch__knob-container">
                <span class="switch__knob">
                    <svg
                        class="switch__knob-neon"
                        viewBox="0 0 48 48"
                        width="36"
                        height="36"
                        xmlns="http://www.w3.org/2000/svg"
                    >
                        <circle
                            fill="none"
                            stroke="url(#g2)"
                            stroke-dasharray="0 90.32 0 54.19"
                            stroke-linecap="round"
                            stroke-width="1"
                            r="23"
                            cx="24"
                            cy="24"
                            transform="rotate(-112.5,24,24)"
                        ></circle>
                    </svg>
                </span>
            </span>
            <span class="switch__led"></span>
            <span class="switch__text">Power</span>
        </label>
    </div>
</body>
</html>
